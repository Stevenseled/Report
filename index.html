<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品报告</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    line-height: 1.6;
    padding: 40px 20px;
  }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
  .project-list { display: flex; flex-direction: column; gap: 16px; }
  .project-card {
    background: #fff;
    border: 1px solid #e0e4ec;
    border-radius: 12px;
    padding: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .project-card:hover { border-color: #4fc3f7; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .project-info h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .project-info .desc { font-size: 13px; color: #888; }
  .project-info .count { font-size: 12px; color: #aaa; margin-top: 4px; }
  .arrow { font-size: 20px; color: #ccc; }
  .project-card:hover .arrow { color: #4fc3f7; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 产品报告</h1>
  <p class="subtitle">Vivosun / MayGrove · 产品分析报告合集</p>

  <div class="project-list">
    <a class="project-card" href="heater/">
      <div class="project-info">
        <h3>🔥 智能种植加热器</h3>
        <div class="desc">竞品对比 · Reddit 洞察 · Q3 策略汇报 · 定价分析</div>
        <div class="count">3 份报告</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="project-card" href="V30/">
      <div class="project-info">
        <h3>🌱 MayGrove 种菜机</h3>
        <div class="desc">访谈前分析 · 根腐病与维保 · 竞品对标</div>
        <div class="count">3 份报告</div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

  <p style="margin-top:32px;font-size:12px;color:#aaa;text-align:center;">
    自动生成 · 数据来源：Amazon · Reddit · Hermes Agent
  </p>
</div>
</body>
</html>
